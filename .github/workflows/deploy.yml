name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: poko-miko
  API_IMAGE_NAME: cloud-native-boilerplate-api
  WORKER_IMAGE_NAME: cloud-native-boilerplate-worker
  KUBE_NAMESPACE: default
  API_DEPLOYMENT_NAME: agnos-api
  WORKER_DEPLOYMENT_NAME: agnos-worker
  API_CONTAINER_NAME: api
  WORKER_CONTAINER_NAME: worker

jobs:
  lint-test-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
          pip install flake8 pytest pip-audit==2.7.3

      - name: Run flake8
        run: |
          flake8 src/

      - name: Run tests
        run: |
          PYTHONPATH=src pytest -q src/test_api.py

      - name: Audit Python dependencies
        run: |
          pip-audit -r src/requirements.txt || true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        run: |
          docker build \
            -f Dockerfile.api \
            -t $REGISTRY/$IMAGE_OWNER/$API_IMAGE_NAME:${{ github.sha }} \
            -t $REGISTRY/$IMAGE_OWNER/$API_IMAGE_NAME:latest \
            .

      - name: Build Worker image
        run: |
          docker build \
            -f Dockerfile.worker \
            -t $REGISTRY/$IMAGE_OWNER/$WORKER_IMAGE_NAME:${{ github.sha }} \
            -t $REGISTRY/$IMAGE_OWNER/$WORKER_IMAGE_NAME:latest \
            .

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WORKER_IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push API image
        run: |
          docker push $REGISTRY/$IMAGE_OWNER/$API_IMAGE_NAME:${{ github.sha }}
          docker push $REGISTRY/$IMAGE_OWNER/$API_IMAGE_NAME:latest

      - name: Push Worker image
        run: |
          docker push $REGISTRY/$IMAGE_OWNER/$WORKER_IMAGE_NAME:${{ github.sha }}
          docker push $REGISTRY/$IMAGE_OWNER/$WORKER_IMAGE_NAME:latest

  deploy:
    needs: lint-test-build-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.KUBE_CONFIG_DATA }}" ]; then
            echo "KUBE_CONFIG_DATA is empty"
            exit 1
          fi

          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connection
        shell: bash
        run: |
          set -euo pipefail
          test -s ~/.kube/config
          kubectl config get-contexts
          kubectl config current-context
          kubectl cluster-info
          kubectl get ns

      - name: Ensure namespace exists
        shell: bash
        run: |
          set -euo pipefail
          kubectl get namespace "${KUBE_NAMESPACE}" >/dev/null 2>&1 || kubectl create namespace "${KUBE_NAMESPACE}"

      - name: Apply manifests
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -n "${KUBE_NAMESPACE}" -f k8s/configmap.yaml
          kubectl apply -n "${KUBE_NAMESPACE}" -f k8s/api-deployment.yaml
          kubectl apply -n "${KUBE_NAMESPACE}" -f k8s/api-service.yaml
          kubectl apply -n "${KUBE_NAMESPACE}" -f k8s/api-pdb.yaml
          kubectl apply -n "${KUBE_NAMESPACE}" -f k8s/worker-deployment.yaml
          kubectl apply -n "${KUBE_NAMESPACE}" -f k8s/hpa.yaml

      - name: Update deployment images
        shell: bash
        run: |
          set -euo pipefail
          kubectl set image deployment/${API_DEPLOYMENT_NAME} \
            ${API_CONTAINER_NAME}=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }} \
            -n "${KUBE_NAMESPACE}"

          kubectl set image deployment/${WORKER_DEPLOYMENT_NAME} \
            ${WORKER_CONTAINER_NAME}=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WORKER_IMAGE_NAME }}:${{ github.sha }} \
            -n "${KUBE_NAMESPACE}"

      - name: Wait for rollout
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status deployment/${API_DEPLOYMENT_NAME} -n "${KUBE_NAMESPACE}" --timeout=180s
          kubectl rollout status deployment/${WORKER_DEPLOYMENT_NAME} -n "${KUBE_NAMESPACE}" --timeout=180s

      - name: Show resources
        if: always()
        shell: bash
        run: |
          kubectl get all -n "${KUBE_NAMESPACE}"
