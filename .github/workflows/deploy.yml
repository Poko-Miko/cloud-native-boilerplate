name: CI/CD Pipeline
on:
  push:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
      - name: Install flake8 & pytest
        run: pip install flake8 pytest
      - name: Lint with flake8
        run: flake8 src/
      - name: Run Tests (Mock)
        run: echo "Tests passed"

  build-and-scan:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image
        run: docker build -t agnos-api:${{ github.sha }} -f Dockerfile.api .
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'agnos-api:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  deploy:
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to K8s (Mock)
        run: |
          echo "kubectl apply -f k8s/configmap.yaml"
          echo "kubectl set image deployment/agnos-api api=agnos-api:${{ github.sha }}"
          echo "Deployment successful"